<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS — AI City</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/city.css" />
  <link rel="stylesheet" href="styles/animations.css" />
  <link rel="stylesheet" href="styles/assistant.css" />
</head>
<body data-city-state="idle" data-orb-state="idle">

  <canvas id="particle-canvas" aria-hidden="true"></canvas>
  <div class="bg-layer bg-deep" aria-hidden="true"></div>
  <div class="bg-layer bg-mid" aria-hidden="true"></div>
  <div class="bg-layer bg-overlay" aria-hidden="true"></div>

  <!-- ENERGY TRAIL CANVAS -->
  <canvas id="trail-canvas" aria-hidden="true"></canvas>

  <div id="city-scene" class="city-scene" role="main">

    <!-- TOP HUD -->
    <header class="hud-top" aria-label="City HUD">
      <div class="hud-logo">
        <span class="hud-logo__text">JARVIS</span>
        <span class="hud-logo__version">v3.0</span>
      </div>
      <div class="hud-status">
        <span class="hud-status__dot"></span>
        <span class="hud-status__label" id="status-label">STANDBY</span>
      </div>
      <nav class="hud-nav" id="hud-nav" aria-label="City navigation">
        <button class="hud-nav__btn" data-route="home" aria-current="page">HOME</button>
        <button class="hud-nav__btn" data-route="city">CITY</button>
        <button class="hud-nav__btn" data-route="agents">AGENTS</button>
      </nav>
    </header>

    <!-- SKYLINE -->
    <div class="skyline" id="skyline" aria-hidden="true">
      <svg class="skyline__svg" viewBox="0 0 1400 300" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
        <g class="skyline__far">
          <rect x="0" y="220" width="60" height="80" rx="2"/><rect x="20" y="200" width="20" height="100" rx="1"/>
          <rect x="70" y="180" width="80" height="120" rx="2"/><rect x="100" y="160" width="15" height="140" rx="1"/>
          <rect x="160" y="190" width="70" height="110" rx="2"/><rect x="240" y="170" width="90" height="130" rx="2"/>
          <rect x="280" y="150" width="20" height="150" rx="1"/><rect x="340" y="200" width="60" height="100" rx="2"/>
          <rect x="410" y="160" width="100" height="140" rx="2"/><rect x="450" y="130" width="25" height="170" rx="1"/>
          <rect x="520" y="175" width="80" height="125" rx="2"/><rect x="610" y="155" width="110" height="145" rx="2"/>
          <rect x="660" y="120" width="18" height="180" rx="1"/><rect x="730" y="165" width="90" height="135" rx="2"/>
          <rect x="830" y="145" width="100" height="155" rx="2"/><rect x="870" y="110" width="22" height="190" rx="1"/>
          <rect x="940" y="175" width="80" height="125" rx="2"/><rect x="1030" y="185" width="70" height="115" rx="2"/>
          <rect x="1110" y="155" width="90" height="145" rx="2"/><rect x="1150" y="130" width="18" height="170" rx="1"/>
          <rect x="1210" y="170" width="85" height="130" rx="2"/><rect x="1300" y="190" width="60" height="110" rx="2"/>
          <rect x="1360" y="210" width="40" height="90" rx="2"/>
        </g>
        <g class="skyline__mid">
          <rect x="30" y="230" width="50" height="70" rx="2"/><rect x="120" y="210" width="40" height="90" rx="2"/>
          <rect x="200" y="220" width="55" height="80" rx="2"/><rect x="310" y="195" width="60" height="105" rx="2"/>
          <rect x="480" y="205" width="45" height="95" rx="2"/><rect x="560" y="185" width="70" height="115" rx="2"/>
          <rect x="680" y="215" width="50" height="85" rx="2"/><rect x="770" y="200" width="55" height="100" rx="2"/>
          <rect x="900" y="190" width="65" height="110" rx="2"/><rect x="1000" y="210" width="45" height="90" rx="2"/>
          <rect x="1080" y="200" width="55" height="100" rx="2"/><rect x="1180" y="215" width="50" height="85" rx="2"/>
          <rect x="1280" y="205" width="60" height="95" rx="2"/>
        </g>
        <g class="skyline__windows" opacity="0.6">
          <rect x="35" y="235" width="4" height="4" rx="1"/><rect x="45" y="235" width="4" height="4" rx="1"/>
          <rect x="55" y="235" width="4" height="4" rx="1"/><rect x="35" y="245" width="4" height="4" rx="1"/>
          <rect x="315" y="200" width="4" height="4" rx="1"/><rect x="325" y="200" width="4" height="4" rx="1"/>
          <rect x="335" y="200" width="4" height="4" rx="1"/><rect x="315" y="212" width="4" height="4" rx="1"/>
          <rect x="565" y="190" width="4" height="4" rx="1"/><rect x="578" y="190" width="4" height="4" rx="1"/>
          <rect x="905" y="195" width="4" height="4" rx="1"/><rect x="918" y="195" width="4" height="4" rx="1"/>
        </g>
        <line x1="0" y1="299" x2="1400" y2="299" stroke-width="2"/>
      </svg>
    </div>

    <!-- MASTER ORB -->
    <div class="orb-wrapper" id="orb-wrapper">
      <div class="orb-ring orb-ring--4" aria-hidden="true"></div>
      <div class="orb-ring orb-ring--3" aria-hidden="true"></div>
      <div class="orb-ring orb-ring--2" aria-hidden="true"></div>
      <div class="orb-ring orb-ring--1" aria-hidden="true"></div>
      <!-- Speaking waveform bars around orb -->
      <div class="orb-waveform" id="orb-waveform" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span>
      </div>
      <button class="orb" id="master-orb" aria-label="Activate JARVIS voice assistant" aria-pressed="false">
        <div class="orb__inner" aria-hidden="true">
          <div class="orb__core"></div>
          <div class="orb__scan"></div>
          <svg class="orb__icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="32" cy="32" r="20" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3"/>
            <circle cx="32" cy="32" r="10" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="32" cy="32" r="3" fill="currentColor"/>
            <line x1="32" y1="4" x2="32" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="32" y1="50" x2="32" y2="60" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="4" y1="32" x2="14" y2="32" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="50" y1="32" x2="60" y2="32" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="orb__label" id="orb-label">JARVIS</span>
        </div>
      </button>
    </div>

    <!-- CONVERSATIONAL UI PANEL -->
    <div class="convo-panel" id="convo-panel" aria-label="AI Assistant conversation" role="complementary">
      <div class="convo-panel__messages" id="convo-messages" aria-live="polite" aria-atomic="false"></div>
      <div class="convo-panel__input-row">
        <div class="convo-input-wrap">
          <input
            type="text"
            id="convo-text-input"
            class="convo-text-input"
            placeholder="Type a message..."
            aria-label="Type a message to JARVIS"
            maxlength="500"
            autocomplete="off"
          />
          <button class="convo-send-btn" id="convo-send-btn" aria-label="Send message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <button class="convo-mic-btn" id="convo-mic-btn" aria-label="Start voice input" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
      </div>
    </div>

    <!-- CITY GRID -->
    <div class="city-grid" id="city-grid" aria-label="AI Agent Buildings" role="region"></div>

    <!-- ACTIVATION OVERLAY -->
    <div class="activation-overlay" id="activation-overlay" aria-hidden="true">
      <div class="activation-overlay__ring"></div>
      <div class="activation-overlay__ring"></div>
      <div class="activation-overlay__ring"></div>
    </div>

    <!-- BUILDING WORKSPACE MODAL -->
    <div class="workspace-modal" id="workspace-modal" role="dialog" aria-modal="true" aria-labelledby="workspace-title" hidden>
      <div class="workspace-modal__backdrop" id="workspace-backdrop"></div>
      <div class="workspace-modal__panel" id="workspace-panel">
        <div class="workspace-modal__header">
          <div class="workspace-modal__icon" id="workspace-icon"></div>
          <div class="workspace-modal__meta">
            <h2 class="workspace-modal__title" id="workspace-title"></h2>
            <p class="workspace-modal__desc" id="workspace-desc"></p>
          </div>
          <button class="workspace-modal__close" id="workspace-close" aria-label="Close workspace">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="workspace-modal__actions" id="workspace-actions"></div>
        <div class="workspace-modal__chat" id="workspace-chat">
          <div class="workspace-modal__chat-messages" id="workspace-messages" aria-live="polite"></div>
          <div class="workspace-modal__chat-input-row">
            <input type="text" id="workspace-input" class="workspace-input" placeholder="Ask this agent..." autocomplete="off" maxlength="500" />
            <button class="workspace-send-btn" id="workspace-send-btn" aria-label="Send to agent">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- BOTTOM HUD -->
    <footer class="hud-bottom" aria-label="System status">
      <div class="hud-bottom__left">
        <span class="hud-tag">SYS</span>
        <span id="sys-time" class="hud-clock">00:00:00</span>
      </div>
      <div class="hud-bottom__center">
        <div class="hud-waveform" id="hud-waveform" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
      <div class="hud-bottom__right">
        <span class="hud-tag">GRID</span>
        <span id="building-count" class="hud-clock">00</span>
      </div>
    </footer>

  </div><!-- /city-scene -->

  <script type="module" src="js/main.js"></script>
</body>
</html>
