<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JARVIS — AI City</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/city.css" />
  <link rel="stylesheet" href="styles/animations.css" />
</head>
<body data-city-state="idle">

  <!-- ═══════════════════════════════════════════════
       CANVAS LAYER — particles
  ═══════════════════════════════════════════════ -->
  <canvas id="particle-canvas" aria-hidden="true"></canvas>

  <!-- ═══════════════════════════════════════════════
       BACKGROUND LAYERS
  ═══════════════════════════════════════════════ -->
  <div class="bg-layer bg-deep"    aria-hidden="true"></div>
  <div class="bg-layer bg-mid"     aria-hidden="true"></div>
  <div class="bg-layer bg-overlay" aria-hidden="true"></div>

  <!-- ═══════════════════════════════════════════════
       CITY SCENE
  ═══════════════════════════════════════════════ -->
  <div id="city-scene" class="city-scene" role="main">

    <!-- TOP HUD -->
    <header class="hud-top" aria-label="City HUD">
      <div class="hud-logo">
        <span class="hud-logo__text">JARVIS</span>
        <span class="hud-logo__version">v2.0</span>
      </div>
      <div class="hud-status" id="hud-status">
        <span class="hud-status__dot"></span>
        <span class="hud-status__label" id="status-label">STANDBY</span>
      </div>
      <nav class="hud-nav" id="hud-nav" aria-label="City navigation">
        <button class="hud-nav__btn" data-route="home" aria-current="page">HOME</button>
        <button class="hud-nav__btn" data-route="city">CITY</button>
        <button class="hud-nav__btn" data-route="agents">AGENTS</button>
      </nav>
    </header>

    <!-- SKYLINE -->
    <div class="skyline" id="skyline" aria-hidden="true">
      <svg class="skyline__svg" viewBox="0 0 1400 300" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
        <!-- Far background buildings -->
        <g class="skyline__far">
          <rect x="0"    y="220" width="60"  height="80"  rx="2"/>
          <rect x="20"   y="200" width="20"  height="100" rx="1"/>
          <rect x="70"   y="180" width="80"  height="120" rx="2"/>
          <rect x="100"  y="160" width="15"  height="140" rx="1"/>
          <rect x="160"  y="190" width="70"  height="110" rx="2"/>
          <rect x="240"  y="170" width="90"  height="130" rx="2"/>
          <rect x="280"  y="150" width="20"  height="150" rx="1"/>
          <rect x="340"  y="200" width="60"  height="100" rx="2"/>
          <rect x="410"  y="160" width="100" height="140" rx="2"/>
          <rect x="450"  y="130" width="25"  height="170" rx="1"/>
          <rect x="520"  y="175" width="80"  height="125" rx="2"/>
          <rect x="610"  y="155" width="110" height="145" rx="2"/>
          <rect x="660"  y="120" width="18"  height="180" rx="1"/>
          <rect x="730"  y="165" width="90"  height="135" rx="2"/>
          <rect x="830"  y="145" width="100" height="155" rx="2"/>
          <rect x="870"  y="110" width="22"  height="190" rx="1"/>
          <rect x="940"  y="175" width="80"  height="125" rx="2"/>
          <rect x="1030" y="185" width="70"  height="115" rx="2"/>
          <rect x="1110" y="155" width="90"  height="145" rx="2"/>
          <rect x="1150" y="130" width="18"  height="170" rx="1"/>
          <rect x="1210" y="170" width="85"  height="130" rx="2"/>
          <rect x="1300" y="190" width="60"  height="110" rx="2"/>
          <rect x="1360" y="210" width="40"  height="90"  rx="2"/>
        </g>
        <!-- Mid buildings -->
        <g class="skyline__mid">
          <rect x="30"   y="230" width="50"  height="70"  rx="2"/>
          <rect x="120"  y="210" width="40"  height="90"  rx="2"/>
          <rect x="200"  y="220" width="55"  height="80"  rx="2"/>
          <rect x="310"  y="195" width="60"  height="105" rx="2"/>
          <rect x="480"  y="205" width="45"  height="95"  rx="2"/>
          <rect x="560"  y="185" width="70"  height="115" rx="2"/>
          <rect x="680"  y="215" width="50"  height="85"  rx="2"/>
          <rect x="770"  y="200" width="55"  height="100" rx="2"/>
          <rect x="900"  y="190" width="65"  height="110" rx="2"/>
          <rect x="1000" y="210" width="45"  height="90"  rx="2"/>
          <rect x="1080" y="200" width="55"  height="100" rx="2"/>
          <rect x="1180" y="215" width="50"  height="85"  rx="2"/>
          <rect x="1280" y="205" width="60"  height="95"  rx="2"/>
        </g>
        <!-- Windows grid pattern (mid buildings) -->
        <g class="skyline__windows" opacity="0.6">
          <rect x="35"   y="235" width="4" height="4" rx="1"/>
          <rect x="45"   y="235" width="4" height="4" rx="1"/>
          <rect x="55"   y="235" width="4" height="4" rx="1"/>
          <rect x="35"   y="245" width="4" height="4" rx="1"/>
          <rect x="45"   y="245" width="4" height="4" rx="1"/>
          <rect x="55"   y="245" width="4" height="4" rx="1"/>
          <rect x="315"  y="200" width="4" height="4" rx="1"/>
          <rect x="325"  y="200" width="4" height="4" rx="1"/>
          <rect x="335"  y="200" width="4" height="4" rx="1"/>
          <rect x="345"  y="200" width="4" height="4" rx="1"/>
          <rect x="315"  y="212" width="4" height="4" rx="1"/>
          <rect x="325"  y="212" width="4" height="4" rx="1"/>
          <rect x="335"  y="212" width="4" height="4" rx="1"/>
          <rect x="345"  y="212" width="4" height="4" rx="1"/>
          <rect x="565"  y="190" width="4" height="4" rx="1"/>
          <rect x="578"  y="190" width="4" height="4" rx="1"/>
          <rect x="591"  y="190" width="4" height="4" rx="1"/>
          <rect x="565"  y="203" width="4" height="4" rx="1"/>
          <rect x="578"  y="203" width="4" height="4" rx="1"/>
          <rect x="591"  y="203" width="4" height="4" rx="1"/>
          <rect x="905"  y="195" width="4" height="4" rx="1"/>
          <rect x="918"  y="195" width="4" height="4" rx="1"/>
          <rect x="931"  y="195" width="4" height="4" rx="1"/>
          <rect x="944"  y="195" width="4" height="4" rx="1"/>
          <rect x="905"  y="208" width="4" height="4" rx="1"/>
          <rect x="918"  y="208" width="4" height="4" rx="1"/>
          <rect x="931"  y="208" width="4" height="4" rx="1"/>
          <rect x="944"  y="208" width="4" height="4" rx="1"/>
        </g>
        <!-- Ground line -->
        <line x1="0" y1="299" x2="1400" y2="299" stroke-width="2"/>
      </svg>
    </div>

    <!-- MASTER ORB / CENTER CIRCLE -->
    <div class="orb-wrapper" id="orb-wrapper">
      <div class="orb-ring orb-ring--4" aria-hidden="true"></div>
      <div class="orb-ring orb-ring--3" aria-hidden="true"></div>
      <div class="orb-ring orb-ring--2" aria-hidden="true"></div>
      <div class="orb-ring orb-ring--1" aria-hidden="true"></div>
      <button
        class="orb"
        id="master-orb"
        aria-label="Activate JARVIS AI City"
        aria-pressed="false"
      >
        <div class="orb__inner" aria-hidden="true">
          <div class="orb__core"></div>
          <div class="orb__scan"></div>
          <svg class="orb__icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="32" cy="32" r="20" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 3"/>
            <circle cx="32" cy="32" r="10" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="32" cy="32" r="3" fill="currentColor"/>
            <line x1="32" y1="4"  x2="32" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="32" y1="50" x2="32" y2="60" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="4"  y1="32" x2="14" y2="32" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="50" y1="32" x2="60" y2="32" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span class="orb__label">JARVIS</span>
        </div>
      </button>
    </div>

    <!-- CITY GRID — buildings rendered by JS -->
    <div class="city-grid" id="city-grid" aria-label="AI Agent Buildings" role="region"></div>

    <!-- ACTIVATION OVERLAY -->
    <div class="activation-overlay" id="activation-overlay" aria-hidden="true">
      <div class="activation-overlay__ring"></div>
      <div class="activation-overlay__ring"></div>
      <div class="activation-overlay__ring"></div>
    </div>

    <!-- BOTTOM HUD -->
    <footer class="hud-bottom" aria-label="System status">
      <div class="hud-bottom__left">
        <span class="hud-tag">SYS</span>
        <span id="sys-time" class="hud-clock">00:00:00</span>
      </div>
      <div class="hud-bottom__center">
        <div class="hud-waveform" id="hud-waveform" aria-hidden="true">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
      <div class="hud-bottom__right">
        <span class="hud-tag">GRID</span>
        <span id="building-count" class="hud-clock">00</span>
      </div>
    </footer>

  </div><!-- /city-scene -->

  <!-- SCRIPTS -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
